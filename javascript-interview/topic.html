<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Topics</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body.dark-mode {
            background-color: #121212;
            color: white;
        }
        .sidebar {
            height: 100vh;
            position: sticky;
            top: 70px;
        }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .accordion-button::after {
            filter: invert(1);
        }
    </style>
</head>

<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-header">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Web Topics</a>

            <!-- Dark Mode Toggle -->
            <button id="darkModeBtn" class="btn btn-outline-light">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar Navigation -->
            <div class="col-md-3 col-lg-2 bg-white border-end sidebar p-3">

                <h5 class="fw-bold">Categories</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="#html">HTML</a></li>
                    <li class="nav-item"><a class="nav-link" href="#css">CSS</a></li>
                    <li class="nav-item"><a class="nav-link" href="#js">JavaScript</a></li>
                </ul>

                <!-- Search -->
                <input id="searchInput" type="text" class="form-control mt-4" placeholder="Search Topics...">
            </div>

            <!-- Content Area -->
            <div class="col-md-9 col-lg-10 p-4">

                <h2 class="fw-bold mb-4">Web Development Topics</h2>


                <!-- JAVASCRIPT CATEGORY -->
                <h4 id="js" class="mt-4">JavaScript</h4>
                <div class="accordion mb-5" id="jsAccordion">

                    <div class="accordion-item topic-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#js1">
                                <i class="fa-solid fa-bolt me-2"></i> What is JavaScript?
                            </button>
                        </h2>
                        <div id="js1" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                JavaScript is a programming language used to create dynamic web behavior.
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2025 Web Topics — All Rights Reserved
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Dark Mode Toggle
        $("#darkModeBtn").click(function () {
            $("body").toggleClass("dark-mode");
        });

        // Search Filter
        $("#searchInput").on("keyup", function () {
            let value = $(this).val().toLowerCase();
            $(".topic-item").filter(function () {
                $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
            });
        });
    </script>

</body>
</html>
